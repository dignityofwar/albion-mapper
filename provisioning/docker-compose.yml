version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-dbname}
    ports:
      - '5432:5432'
    volumes:
      - ./volumes/db-data:/var/lib/postgresql/data

  server:
    image: maelstromeous/applications:dig-roadmap-latest
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://user:password@db:5432/dbname}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      - db
